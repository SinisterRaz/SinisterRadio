*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#120a02;--frame:#5c3820;

body{

  display:flex;

.radio{

.brand{

.logo{

.display{

.btn{

  padding:15px;

  text-transform:uppercase;
  letter-spacing:1px;
}

.btn:hover{

.volume{

let cur = 0;
let on = true;
const p = document.getElementById('player');
const pwr = document.getElementById('pwr');
const metaCache = {};

// EXACT TV SYNC LOGIC
async function fetchFiles(identifier){
  if(metaCache[identifier]) return metaCache[identifier];
  
  try{
    const r = await fetch('https://archive.org/metadata/' + identifier);
    const j = await r.json();
    
    const files = j.files.filter(f => {
      if(!f.name) return false;
      
      const validExtensions = ['.mp3', '.m4a', '.aac', '.ogg', '.oga', '.flac', '.wav', '.webm', '.mkv'];
      const hasValidExt = validExtensions.some(ext => f.name.toLowerCase().endsWith(ext));
      if(!hasValidExt) return false;
      
      if(f.name.includes('_thumb') || f.name.includes('_sample')) return false;
      if(f.source === 'metadata') return false;
      
      const nameLower = f.name.toLowerCase();
      if(nameLower.includes('skit')) return false;
      if(nameLower.includes('intro')) return false;
      if(nameLower.includes('outro')) return false;
      if(nameLower.includes('interlude')) return false;
      
      const length = parseFloat(f.length);
      if(!isNaN(length) && length > 0 && length < 90) return false;
      
      const size = parseFloat(f.size);
      if(!isNaN(size) && size > 500000000) return false;
      
      return true;
    }).sort((a,b) => {
      const aScore = (a.name.endsWith('.mp4') || a.name.endsWith('.mp3')) ? 2 : (a.name.endsWith('.ia.mp4')) ? 1 : 0;
      const bScore = (b.name.endsWith('.mp4') || b.name.endsWith('.mp3')) ? 2 : (b.name.endsWith('.ia.mp4')) ? 1 : 0;
      return bScore - aScore || a.name.localeCompare(b.name);
    });
    
    const result = files.map(f => ({
      u: 'https://archive.org/download/' + identifier + '/' + encodeURIComponent(f.name),
      n: f.name.replace(/\.[^.]+$/, '').replace(/[-_.]/g, ' ').trim(),
      dur: parseFloat(f.length) || 180
    }));
    
    if(result.length) metaCache[identifier] = result;
    return result;
  } catch(e) {
    console.error('Error fetching files from', identifier, e);
    return [];
  }
}

async function playSync(){
  if(!on) return;
  
  const ch = STATIONS[cur];
  const showList = ch.networkShows || [];
  if(showList.length === 0) return;
  
  // EXACT TV SYNC CALCULATION
  const blockDuration = 180; // 3 min
  const now = Date.now();
  const secondsSinceMidnight = Math.floor(now / 1000) % 86400;
  const totalBlocks = Math.floor(secondsSinceMidnight / blockDuration);
  const showIndex = totalBlocks % showList.length;
  const timeIntoBlock = secondsSinceMidnight % blockDuration;
  
  const today = Math.floor(Date.now() / (24 * 60 * 60 * 1000));
  const episodeSeed = (today + totalBlocks) % 1000;
  
  const currentShow = showList[showIndex];
  const nextShow = showList[(showIndex + 1) % showList.length];
  
  console.log('Syncing:', {show: currentShow, block: totalBlocks, timeIntoBlock});
  
  document.getElementById('now-playing').textContent = `Now: ${currentShow.substring(0,30)}... | Next: ${nextShow.substring(0,20)}...`;
  
  // Fetch tracks
  const files = await fetchFiles(currentShow);
  if(files.length === 0){
    document.getElementById('now-playing').textContent = 'No tracks available';
    return;
  }
  
  const trackIndex = episodeSeed % files.length;
  const track = files[trackIndex];
  
  p.src = track.u;
  p.currentTime = 0; // Always start from beginning
  p.play().catch(e => console.log('Play blocked:', e));
}

function go(i){
  if(!on) return;
  cur = i;
  const s = STATIONS[i];
  document.getElementById('num').textContent = s.num;
  document.getElementById('name').textContent = s.name;
  playSync();
  
  document.querySelectorAll('.btn').forEach((b,x) => {
    if(x >= 3 && x <= 16) b.classList.toggle('active', x-3 === i);
  });
}

function next(){
  if(!on) return;
  go((cur + 1) % STATIONS.length);
}

function prev(){
  if(!on) return;
  go((cur - 1 + STATIONS.length) % STATIONS.length);
}

function random(){
  if(!on) return;
  go(Math.floor(Math.random() * STATIONS.length));
}

function power(){
  on = !on;
  if(on){
    pwr.textContent = 'POWER';
    pwr.classList.remove('active');
    go(cur);
  } else {
    pwr.textContent = 'OFF';
    pwr.classList.add('active');
    p.pause();
    p.src = '';
  }
}

document.getElementById('vol').oninput = function(){
  p.volume = this.value / 100;
};

p.addEventListener('ended', () => {
  if(on){
    // When track ends, move to NEXT track in the collection, don't resync to same track
    setTimeout(async () => {
      const ch = STATIONS[cur];
      const showList = ch.networkShows || [];
      if(showList.length === 0) return;
      
      const blockDuration = 180;
      const now = Date.now();
      const secondsSinceMidnight = Math.floor(now / 1000) % 86400;
      const totalBlocks = Math.floor(secondsSinceMidnight / blockDuration);
      const showIndex = totalBlocks % showList.length;
      
      const today = Math.floor(Date.now() / (24 * 60 * 60 * 1000));
      const episodeSeed = (today + totalBlocks) % 1000;
      
      const currentShow = showList[showIndex];
      const files = await fetchFiles(currentShow);
      if(files.length === 0) return;
      
      // Get NEXT track (not same track)
      const currentTrackIndex = episodeSeed % files.length;
      const nextTrackIndex = (currentTrackIndex + 1) % files.length;
      const track = files[nextTrackIndex];
      
      p.src = track.u;
      p.currentTime = 0; // Start from beginning
      p.play().catch(e => console.log('Play blocked:', e));
    }, 100);
  }
});

// Don't auto-resync - let tracks play naturally and only sync on station change

go(0);
